name: Build & Push

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2 # updated

      - name: Log in to Docker Hub
        uses: docker/login-action@v3.3.0 # updated

      - name: Build and push backend image
        uses: docker/build-push-action@v6 # updated

      - name: Build and push frontend image
        uses: docker/build-push-action@v6 # updated
